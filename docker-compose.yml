# compose 的作用：根据 Dockerfile的规则，将项目打包成镜像 + 启动镜像，让它变成一个运行的容器
# 对应的命令：docker compose up   →  自动 docker build -t myapp .  + docker run -d -p 5000:5000 myapp

# 同一个镜像（Dockerfile）拷贝了两份，跑成两个容器（互不影响），web 那份按默认 CMD 跑 Flask，test 那份用 command: 换了启动命令跑 pytest。

services:           # 下面列要跑几个容器
  # web 容器：Flask 运行中，监听 5000 端口，等人访问
  web:              # 给第一个容器起个名叫 "web"（随便起）
    build: .        # 镜像从哪来 → 当前目录的 Dockerfile
    ports:          # 端口怎么映射
      - "5001:5000" # 本机5001 → 容器5000（macOS AirPlay占5000，改用5001）
    volumes:        # 目录怎么挂载
      - .:/app      # 当前目录 → 容器的 /app
    environment:
      - FLASK_APP=app  # 告诉 Flask CLI ：应用在 app/ 目录下（app/__init__.py 里），没有这个它找不到入口。


  # test 容器：pytest 运行中，发请求到 web:5000（即上一个容器），跑完退出
  test:                             # 给第二个容器起个名叫 "test"（随便起），注意缩进与 web 一致
    build: .                        # 镜像从哪来 → 当前目录的 Dockerfile。compose 构建一次镜像，两个容器复用
    command: pytest tests/ -v       # 覆盖掉 Dockerfile 里的 CMD，不跑 Flask，跑 pytest
    volumes:              # 目录怎么挂载
      - .:/app            # 当前目录 → 容器的 /app
    environment:
      - FLASK_APP=app     # 告诉 Flask CLI ：应用在 app/ 目录下（app/__init__.py 里），没有这个它找不到入口。
    depends_on:
      - web               # 控制启动顺序 —— 等 web 容器"就绪"，再启动 test 容器


#  批量统一管理一组关联容器，管理内容：
#   启动哪些容器（web、mysql、redis 等）
#   每个容器镜像、端口映射、挂载目录
#   容器之间网络互通、启动先后顺序
#   环境变量、数据持久化、重启策略